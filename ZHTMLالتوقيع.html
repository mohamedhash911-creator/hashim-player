<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <title>مشروع هاشم الخاص</title>

    

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

    <style>

        * { font-family: 'Aref Ruqaa', serif !important; box-sizing: border-box; }

        

        body {

            margin: 0; background: #000; color: #fff;

            display: flex; flex-direction: column; align-items: center;

            transition: background 0.6s ease; 

        }

        body.purple {

            background: linear-gradient(135deg, #4a148c, #2a0a4d) !important;

        }

        #welcome {

            position: fixed; top: 0; width: 100%; height: 100%;

            background: #000; display: flex; justify-content: center;

            align-items: center; z-index: 10; transition: 1s;

        }

        .video-container {

            width: 90%; max-width: 700px; margin-top: 50px;

            border: 2px solid #00d2ff; border-radius: 15px; overflow: hidden;

            transition: all 0.4s ease;

        }

        video { 

            width: 100%; 

            display: block;

            transition: transform 0.4s, filter 0.3s; 

        }

        .my-buttons { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 95%; max-width: 900px; }

        

        button {

            background: #00d2ff; border: none; padding: 10px 20px;

            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem;

            transition: 0.3s;

        }

        button:hover { background: #fff; color: #000; transform: translateY(-3px); }

        body.cinema h1 { display: none; }

        body.cinema .video-container { max-width: 100vw; width: 100vw; border: none; border-radius: 0; margin-top: 0; }

        /* 🖋️ كود التوقيع الجديد */

        .signature {

            position: fixed;

            bottom: 20px;

            right: 20px;

            font-size: 1.8rem;

            color: rgba(0, 210, 255, 0.5); /* لون أزرق خفيف وشفاف شوية */

            z-index: 9999; /* عشان يفضل فوق كل حاجة */

            pointer-events: none; /* عشان ميعطلش أي ضغطة ماوس تحته */

            text-shadow: 0 0 10px rgba(0,0,0,0.8); /* ضل خفيف عشان يوضح على أي خلفية */

        }

    </style>

</head>

<body>

    <div id="welcome"><h1>موقع هاشم.. جاري التحميل</h1></div>

    

    <h1>منصة هاشم للفيديو</h1>

    

    <div class="video-container">

        <video id="mainVid" controls></video>

    </div>

    

    <div class="my-buttons">

        <input type="file" id="upload" accept="video/*" style="display:none">

        

        <button onclick="document.getElementById('upload').click()">📂 يلا نتفرج</button>

        <button onclick="rotate()">🔄 تدوير</button>

        <button onclick="document.body.classList.toggle('cinema')">🎬 وضع السينما</button>

        <button onclick="document.body.classList.toggle('purple')">💜 لون بنفسجي</button>

        <button onclick="changeVol(0.1)">🔊 رفع الصوت</button>

        <button onclick="changeVol(-0.1)">🔉 خفض الصوت</button>

        <button onclick="changeBrightness(20)">☀️ رفع الإضاءة</button>

        <button onclick="changeBrightness(-20)">🔅 خفض الإضاءة</button>

    </div>

    <div class="signature">محمد هاشم</div>

    <script>

        setTimeout(() => {

            document.getElementById('welcome').style.opacity = '0';

            setTimeout(() => document.getElementById('welcome').style.display = 'none', 1000);

        }, 2000);

        const v = document.getElementById('mainVid');

        let r = 0;

        let currentBrightness = 100;

        document.getElementById('upload').onchange = (e) => {

            const file = e.target.files[0];

            v.src = URL.createObjectURL(file);

            v.play();

            currentBrightness = 100;

            v.style.filter = 'brightness(100%)';

        };

        function rotate() {

            r = (r + 90) % 360;

            v.style.transform = `rotate(${r}deg)`;

        }

        function changeVol(amount) {

            let newVol = v.volume + amount;

            v.volume = Math.max(0, Math.min(1, newVol));

        }

        function changeBrightness(amount) {

            currentBrightness += amount;

            currentBrightness = Math.max(20, Math.min(200, currentBrightness));

            v.style.filter = `brightness(${currentBrightness}%)`;

        }

    </script>

</body>

</html>
