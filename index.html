<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2a0a4d">
    <meta name="description" content="مشغل فيديو احترافي PWA من تصميم محمد هاشم">
    <title>مشغل هاشم · فيديو PWA</title>
    
    <!-- Manifest ملف البيان -->
    <link rel="manifest" href="manifest.json">
    
    <!-- أيقونات تقليدية للمتصفحات القديمة (سيتم التعامل معها عبر Service Worker أيضاً) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { 
            font-family: 'Aref Ruqaa', serif !important; 
            box-sizing: border-box; 
            user-select: none; /* تجنب التحديد أثناء التمرير السريع */
        }
        
        body {
            margin: 0;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.6s ease, backdrop-filter 0.3s;
            min-height: 100vh;
        }
        
        body.purple {
            background: linear-gradient(135deg, #4a148c, #2a0a4d) !important;
        }
        
        /* ترحيب أنيميشن */
        #welcome {
            position: fixed;
            top: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 1s;
            backdrop-filter: blur(4px);
        }
        
        .video-container {
            width: 90%;
            max-width: 700px;
            margin-top: 30px;
            border: 3px solid #00d2ff;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            background: #0a0a0a;
            box-shadow: 0 10px 25px rgba(0,210,255,0.2);
        }
        
        video {
            width: 100%;
            display: block;
            transition: transform 0.4s, filter 0.3s, brightness 0.2s;
            background: black;
        }
        
        .my-buttons {
            margin-top: 25px;
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            max-width: 1000px;
        }
        
        button {
            background: #00d2ff;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-family: inherit;
        }
        
        button:hover {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
        }
        
        /* وضع السينما */
        body.cinema h1 {
            display: none;
        }
        body.cinema .video-container {
            max-width: 100vw;
            width: 100vw;
            border: none;
            border-radius: 0;
            margin-top: 0;
        }
        body.cinema .my-buttons {
            margin-top: 15px;
            margin-bottom: 15px;
        }
        body.cinema {
            padding-bottom: 20px;
        }
        
        /* توقيع مميز */
        .signature {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 1.6rem;
            color: rgba(0, 210, 255, 0.5);
            z-index: 9999;
            pointer-events: none;
            text-shadow: 0 0 8px black;
            font-weight: bold;
        }
        
        /* زر التثبيت الخاص PWA */
        .install-btn {
            background: #7c4dff;
            color: white;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .install-btn:hover {
            background: #b47cff;
            color: #fff;
        }
        
        /* تحسين للشاشات الصغيرة */
        @media (max-width: 640px) {
            button {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            .signature {
                font-size: 1.2rem;
            }
            h1 {
                font-size: 1.6rem;
                margin: 15px 0 5px;
            }
        }
        
        /* تزيين شريط التمرير */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #00d2ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="welcome">
        <h1 style="font-size:2rem;">🎬 مشغل هاشم 🎥<br>جاري التحميل...</h1>
    </div>

    <h1>🎞️ منصة هاشم للفيديو</h1>

    <div class="video-container">
        <video id="mainVid" controls crossorigin="anonymous" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d2ff'%3E%3Cpath d='M8 5v14l11-7z'/%3E%3C/svg%3E"></video>
    </div>

    <div class="my-buttons">
        <input type="file" id="upload" accept="video/*" style="display:none">
        
        <button onclick="document.getElementById('upload').click()">📂 يلا نتفرج</button>
        
        <button onclick="skip(-10)">⏮️ -10 ثواني</button>
        <button onclick="skip(10)">⏭️ +10 ثواني</button>
        
        <button onclick="rotate()">🔄 تدوير</button>
        <button onclick="document.body.classList.toggle('cinema')">🎬 وضع السينما</button>
        <button onclick="document.body.classList.toggle('purple')">💜 لون بنفسجي</button>
        
        <button onclick="changeVol(0.1)">🔊 رفع الصوت</button>
        <button onclick="changeVol(-0.1)">🔉 خفض الصوت</button>
        <button onclick="changeBrightness(20)">☀️ رفع الإضاءة</button>
        <button onclick="changeBrightness(-20)">🔅 خفض الإضاءة</button>
        
        <button id="installBtn" class="install-btn" style="display: none;">📲 تثبيت التطبيق</button>
    </div>
    <div class="signature">محمد هاشم</div>

    <script>
        // ---------- التحكم في الفيديو والوظائف ----------
        const v = document.getElementById('mainVid');
        let r = 0;
        let currentBrightness = 100;
        
        // إخفاء الترحيب
        setTimeout(() => {
            const welcomeDiv = document.getElementById('welcome');
            if(welcomeDiv) {
                welcomeDiv.style.opacity = '0';
                setTimeout(() => welcomeDiv.style.display = 'none', 1000);
            }
        }, 1800);
        
        // رفع الفيديو المحلي
        document.getElementById('upload').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                v.src = url;
                v.play().catch(e => console.log("auto-play prevented"));
                currentBrightness = 100;
                v.style.filter = `brightness(${currentBrightness}%)`;
                // إعادة تعيين التدوير عند فيديو جديد اختياريًا
                // لكن نبقي التدوير كما هو
            }
        };
        
        function skip(seconds) {
            v.currentTime += seconds;
        }
        
        function rotate() {
            r = (r + 90) % 360;
            v.style.transform = `rotate(${r}deg)`;
        }
        
        function changeVol(amount) {
            let newVol = v.volume + amount;
            v.volume = Math.max(0, Math.min(1, newVol));
        }
        
        function changeBrightness(amount) {
            currentBrightness += amount;
            currentBrightness = Math.max(20, Math.min(200, currentBrightness));
            v.style.filter = `brightness(${currentBrightness}%)`;
        }
        
        // حفظ حالة الصوت والإضاءة لجلسة التصفح (لا يحتاج تخزين طويل)
        
        // ------------------ PWA: تثبيت التطبيق ------------------
        let deferredPrompt = null;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-flex';
            installBtn.disabled = false;
        });
        
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`نتيجة التثبيت: ${outcome}`);
                deferredPrompt = null;
                installBtn.style.display = 'none';
            } else {
                alert("يمكنك تثبيت التطبيق يدويًا من قائمة المتصفح (أضف إلى الشاشة الرئيسية)");
            }
        });
        
        // تسجيل Service Worker لدعم الـ PWA والأيقونات الديناميكية والتخزين المؤقت
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('✅ Service Worker مسجل بنجاح:', reg.scope);
                }).catch(err => {
                    console.error('❌ فشل تسجيل Service Worker:', err);
                });
            });
        } else {
            console.warn("Service Worker غير مدعوم في هذا المتصفح");
        }
        
        // صيانة بسيطة: إعادة تعيين الفلتر عند تغيير الفيديو بشكل يدوي
        v.addEventListener('loadeddata', () => {
            v.style.filter = `brightness(${currentBrightness}%)`;
        });
        
        // بديل: لو أراد المستخدم فيديو من الرابط (تمديد)
        // إضافة تحسين لوضع ملء الشاشة (اختياري)
    </script>
</body>
</html>
